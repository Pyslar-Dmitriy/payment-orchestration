# Payment Orchestration Platform — Local Infrastructure
# Usage: make up  (from repo root)
# All services share the `payment-net` bridge network.
# Container names resolve as DNS hostnames within that network.

x-laravel-base: &laravel-base
  build:
    dockerfile: Dockerfile
    target: production
  networks:
    - payment-net
  restart: unless-stopped

x-laravel-env-base: &laravel-env-base
  DB_HOST: postgres
  DB_PORT: 5432
  DB_USERNAME: ${POSTGRES_USER}
  DB_PASSWORD: ${POSTGRES_PASSWORD}
  REDIS_HOST: redis
  REDIS_PORT: 6379

# ──────────────────────────────────────────────────────────────────────────────
name: payment-orchestration-platform
services:

  # ────────────────────────────────────────────
  # Infrastructure
  # ────────────────────────────────────────────

  postgres:
    container_name: postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - payment-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    container_name: redis
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - payment-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI
    networks:
      - payment-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka:
    container_name: kafka
    image: apache/kafka:3.9.0
    environment:
      # KRaft mode — no ZooKeeper
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      # Listeners: PLAINTEXT for containers, CONTROLLER for KRaft, EXTERNAL for host tools
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9094:9094"      # External listener for host-side tools (kcat, Kafka UI)
    networks:
      - payment-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server kafka:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  temporal:
    container_name: temporal
    image: temporalio/auto-setup:1.29.4
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    volumes:
      - ./temporal/dynamicconfig/development-sql.yaml:/etc/temporal/config/dynamicconfig/development-sql.yaml:ro
    ports:
      - "7233:7233"      # gRPC frontend
    networks:
      - payment-net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z $(hostname -i) 7233 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  temporal-ui:
    container_name: temporal-ui
    image: temporalio/ui:2.48.1
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8080
    ports:
      - "8080:8080"      # Temporal UI
    networks:
      - payment-net
    restart: unless-stopped
    depends_on:
      - temporal

  prometheus:
    container_name: prometheus
    image: prom/prometheus:v2.52.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - payment-net
    restart: unless-stopped

  loki:
    container_name: loki
    image: grafana/loki:3.0.0
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - payment-net
    restart: unless-stopped

  grafana:
    container_name: grafana
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - payment-net
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki

  # ────────────────────────────────────────────
  # Nginx — shared HTTP frontend for all Laravel services
  # Each server block proxies FastCGI to its paired php-fpm container.
  # ────────────────────────────────────────────

  nginx:
    container_name: nginx
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Static files — each service's public/ directory mounted read-only
      - ../../apps/merchant-api:/var/www/merchant-api:ro
      - ../../apps/payment-domain:/var/www/payment-domain:ro
      - ../../apps/payment-orchestrator:/var/www/payment-orchestrator:ro
      - ../../apps/provider-gateway:/var/www/provider-gateway:ro
      - ../../apps/webhook-ingest:/var/www/webhook-ingest:ro
      - ../../apps/webhook-normalizer:/var/www/webhook-normalizer:ro
      - ../../apps/ledger-service:/var/www/ledger-service:ro
      - ../../apps/merchant-callback-delivery:/var/www/merchant-callback-delivery:ro
      - ../../apps/reporting-projection:/var/www/reporting-projection:ro
    ports:
      - "8001:8001"    # merchant-api
      - "8002:8002"    # payment-domain
      - "8003:8003"    # payment-orchestrator
      - "8004:8004"    # provider-gateway
      - "8005:8005"    # webhook-ingest
      - "8006:8006"    # webhook-normalizer
      - "8007:8007"    # ledger-service
      - "8008:8008"    # merchant-callback-delivery
      - "8009:8009"    # reporting-projection
    networks:
      - payment-net
    restart: unless-stopped
    depends_on:
      - merchant-api
      - payment-domain
      - payment-orchestrator
      - provider-gateway
      - webhook-ingest
      - webhook-normalizer
      - ledger-service
      - merchant-callback-delivery
      - reporting-projection

  # ────────────────────────────────────────────
  # Laravel services (php-fpm)
  # ────────────────────────────────────────────

  merchant-api:
    container_name: merchant-api
    <<: *laravel-base
    build:
      context: ../../apps/merchant-api
      dockerfile: Dockerfile
      target: production
    env_file:
      - ../../apps/merchant-api/.env
    environment:
      <<: *laravel-env-base
      DB_DATABASE: merchant_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  payment-domain:
    container_name: payment-domain
    <<: *laravel-base
    build:
      context: ../../apps/payment-domain
      dockerfile: Dockerfile
      target: production
    env_file:
      - ../../apps/payment-domain/.env
    environment:
      <<: *laravel-env-base
      DB_DATABASE: payment_domain
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment-orchestrator:
    container_name: payment-orchestrator
    <<: *laravel-base
    build:
      context: ../../apps/payment-orchestrator
      dockerfile: Dockerfile
      target: production
    env_file:
      - ../../apps/payment-orchestrator/.env
    environment:
      <<: *laravel-env-base
      DB_DATABASE: payment_orchestrator
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy

  provider-gateway:
    container_name: provider-gateway
    <<: *laravel-base
    build:
      context: ../../apps/provider-gateway
      dockerfile: Dockerfile
      target: production
    env_file:
      - ../../apps/provider-gateway/.env
    environment:
      <<: *laravel-env-base
      DB_DATABASE: provider_gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  webhook-ingest:
    container_name: webhook-ingest
    <<: *laravel-base
    build:
      context: ../../apps/webhook-ingest
      dockerfile: Dockerfile
      target: production
    env_file:
      - ../../apps/webhook-ingest/.env
    environment:
      <<: *laravel-env-base
      DB_DATABASE: webhook_ingest
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  webhook-normalizer:
    container_name: webhook-normalizer
    <<: *laravel-base
    build:
      context: ../../apps/webhook-normalizer
      dockerfile: Dockerfile
      target: production
    env_file:
      - ../../apps/webhook-normalizer/.env
    environment:
      <<: *laravel-env-base
      DB_DATABASE: webhook_normalizer
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ledger-service:
    container_name: ledger-service
    <<: *laravel-base
    build:
      context: ../../apps/ledger-service
      dockerfile: Dockerfile
      target: production
    env_file:
      - ../../apps/ledger-service/.env
    environment:
      <<: *laravel-env-base
      DB_DATABASE: ledger_service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  merchant-callback-delivery:
    container_name: merchant-callback-delivery
    <<: *laravel-base
    build:
      context: ../../apps/merchant-callback-delivery
      dockerfile: Dockerfile
      target: production
    env_file:
      - ../../apps/merchant-callback-delivery/.env
    environment:
      <<: *laravel-env-base
      DB_DATABASE: merchant_callback_delivery
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  reporting-projection:
    container_name: reporting-projection
    <<: *laravel-base
    build:
      context: ../../apps/reporting-projection
      dockerfile: Dockerfile
      target: production
    env_file:
      - ../../apps/reporting-projection/.env
    environment:
      <<: *laravel-env-base
      DB_DATABASE: reporting_projection
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

# ──────────────────────────────────────────────────────────────────────────────
networks:
  payment-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  kafka-data:
  prometheus-data:
  grafana-data:
  loki-data:
