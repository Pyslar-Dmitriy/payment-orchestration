global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # RabbitMQ — metrics exposed by the management plugin
  - job_name: rabbitmq
    static_configs:
      - targets: ['rabbitmq:15692']

