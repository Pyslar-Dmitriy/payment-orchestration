# Local development overrides — auto-loaded by `docker compose up`.
#
# What this does:
#   - Switches every Laravel service to the `local` Dockerfile target
#     (dev composer deps, no config/route/event cache, OPcache disabled)
#   - Bind-mounts source directories so PHP file changes are visible
#     immediately without rebuilding or restarting the container
#   - bootstrap/ is mounted so changes to bootstrap/app.php are live.
#   - vendor/ is intentionally NOT mounted — it stays from the image build.
#     Run `docker compose build <service>` only when composer.json changes.

services:

  merchant-api:
    build:
      target: local
    volumes:
      - ../../apps/merchant-api/app:/var/www/html/app
      - ../../apps/merchant-api/bootstrap:/var/www/html/bootstrap
      - ../../apps/merchant-api/routes:/var/www/html/routes
      - ../../apps/merchant-api/config:/var/www/html/config
      - ../../apps/merchant-api/database:/var/www/html/database
      - ../../apps/merchant-api/resources:/var/www/html/resources
      - ../../apps/merchant-api/tests:/var/www/html/tests

  payment-domain:
