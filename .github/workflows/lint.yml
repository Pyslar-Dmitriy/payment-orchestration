name: Lint

on:
  push:
    paths:
      - 'apps/**'
      - 'packages/**'
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.services.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            packages:
              - 'packages/**'
            ledger-service:
              - 'apps/ledger-service/**'
            merchant-api:
              - 'apps/merchant-api/**'
            merchant-callback-delivery:
              - 'apps/merchant-callback-delivery/**'
            payment-domain:
              - 'apps/payment-domain/**'
            payment-orchestrator:
              - 'apps/payment-orchestrator/**'
            provider-gateway:
              - 'apps/provider-gateway/**'
            reporting-projection:
              - 'apps/reporting-projection/**'
            webhook-ingest:
              - 'apps/webhook-ingest/**'
            webhook-normalizer:
              - 'apps/webhook-normalizer/**'

      - name: Resolve services to lint
        id: services
        uses: actions/github-script@v7
        with:
          script: |
            const all = [
              'ledger-service', 'merchant-api', 'merchant-callback-delivery',
              'payment-domain', 'payment-orchestrator', 'provider-gateway',
              'reporting-projection', 'webhook-ingest', 'webhook-normalizer',
            ]
            if ('${{ steps.filter.outputs.packages }}' === 'true') return all
            const changed = JSON.parse('${{ steps.filter.outputs.changes }}')
            return changed.filter(s => s !== 'packages')

  lint:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: apps/${{ matrix.service }}/vendor
          key: composer-${{ matrix.service }}-${{ hashFiles(format('apps/{0}/composer.lock', matrix.service)) }}
          restore-keys: composer-${{ matrix.service }}-

      - name: Install dependencies
        working-directory: apps/${{ matrix.service }}
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Pint (dry-run)
        working-directory: apps/${{ matrix.service }}
        run: ./vendor/bin/pint --test