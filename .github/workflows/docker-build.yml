name: Docker Build

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
  pull_request:
    paths:
      - 'apps/**'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      services: ${{ steps.services.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ledger-service:
              - 'apps/ledger-service/**'
            merchant-api:
              - 'apps/merchant-api/**'
            merchant-callback-delivery:
              - 'apps/merchant-callback-delivery/**'
            payment-domain:
              - 'apps/payment-domain/**'
            payment-orchestrator:
              - 'apps/payment-orchestrator/**'
            provider-gateway:
              - 'apps/provider-gateway/**'
            reporting-projection:
              - 'apps/reporting-projection/**'
            webhook-ingest:
              - 'apps/webhook-ingest/**'
            webhook-normalizer:
              - 'apps/webhook-normalizer/**'

      - name: Resolve services to build
        id: services
        uses: actions/github-script@v7
        with:
          script: |
            return JSON.parse('${{ steps.filter.outputs.changes }}')

  build:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.service }}
          file: apps/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}